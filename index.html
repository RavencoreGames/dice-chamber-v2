<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Dice of Destiny</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

/* Background */

#background{
    width:100vw;
    height:100vh;
    object-fit:contain;
    display:block;
}


    /* Floating animation */

@keyframes float {
    0%   { transform: translate(-50%, -50%) translateY(0px); }
    50%  { transform: translate(-50%, -50%) translateY(-15px); }
    100% { transform: translate(-50%, -50%) translateY(0px); }
}


#dice{

    position:absolute;

    top:58%;
    left:50%;

    transform:translate(-50%,-50%);

    width:220px;
    
    animation: float 4s ease-in-out infinite;
}
</style>
</head>

<body>

<img id="background" src="Blueprint 2.png">

<img id="dice" src="D20 asset.PNG">

</body>
</html>
