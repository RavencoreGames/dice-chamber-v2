<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Dice of Destiny</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

/* Background */

#background{
    width:100vw;
    height:100vh;
    object-fit:contain;
    display:block;
}

/* Floating D20 */

#dice{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:220px;
}

</style>
</head>

<body>

<img id="background" src="Background A.png">

<img id="dice" src="D20 asset.PNG">

</body>
</html>
