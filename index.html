<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Dice of Destiny</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

/* Background */

#background{
    width:100vw;
    height:100vh;
    object-fit:contain;
    display:block;
}


    /* Floating animation */

@keyframes float {
    0%   { transform: translate(-50%, -50%) translateY(0px); }
    50%  { transform: translate(-50%, -50%) translateY(-15px); }
    100% { transform: translate(-50%, -50%) translateY(0px); }
}

@keyframes pulse {

    0%   { scale:1; }

    50%  { scale:1.15; }

    100% { scale:1; }

}
#dice{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:220px;
    
    animation: float 4s ease-in-out infinite;
}


    #result{

    position:absolute;

    top:82%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:64px;

    color:white;

    font-weight:bold;

    text-shadow:
        0 0 10px #c084ff,
        0 0 20px #c084ff;

    font-family:Arial, sans-serif;
}
    #rollButton{

    position:absolute;

    top:90%;
    left:50%;

    transform:translate(-50%,-50%);

    padding:10px 20px;

    font-size:20px;

    cursor:pointer;
}
   #rollButton{

    position:absolute;

    top:90%;
    left:50%;

    transform:translate(-50%,-50%);

    padding:10px 20px;

    font-size:20px;

    cursor:pointer;
}
.mist{

    position:absolute;

    left:44%;
    top:63%;

    width:6px;
    height:100px;

    background:linear-gradient(
        to top,
        rgba(140,70,255,0),
        rgba(210,170,255,1),
        rgba(140,70,255,0)
    );

    border-radius:999px;

    filter:blur(3px);

    opacity:.8;

    transform:translate(-50%,-50%) rotate(-18deg);

    box-shadow:
        0 0 8px rgba(180,120,255,.9),
        0 0 18px rgba(120,60,255,.8),
        0 0 30px rgba(120,60,255,.4);

    animation: wisp 4s ease-in-out infinite;

    z-index:3;
@keyframes wisp{

    0%{
        transform:translate(-50%,-50%) rotate(-18deg);
        opacity:.2;
    }

    50%{
        transform:translate(-48%,-58%) rotate(-8deg);
        opacity:.9;
    }

    100%{
        transform:translate(-50%,-66%) rotate(10deg);
        opacity:0;
    }

}
#mist1{

    position:absolute;

    left:50%;
    top:50%;

    width:300px;

    opacity:1;

    border:2px solid red;

    z-index:999;

}
</style>
</head>

    <body>

<img id="background" src="Blueprint 2.png">

<img id="dice" src="D20 asset.PNG">
       
<img id="mist1" src="wisp-01.png?test=1">


<div id="result">17</div>

<button id="rollButton">ROLL FOR YOUR FATE</button>

<script>
 document.getElementById("rollButton").onclick = function() {

    document.getElementById("dice").style.animation = "pulse 0.4s ease";

    let roll = Math.floor(Math.random() * 20) + 1;

    document.getElementById("dice").src = "D20-roll-01.png";

    setTimeout(function(){
        document.getElementById("dice").src = "D20-roll-02.png";
    },100);

    setTimeout(function(){
        document.getElementById("dice").src = "D20-roll-03.png";
    },200);

    setTimeout(function(){
        document.getElementById("dice").src = "D20-roll-04.png";
    },300);

    setTimeout(function(){
        document.getElementById("dice").src = "D20-roll-05.png";
    },400);

    setTimeout(function(){
        document.getElementById("dice").src = "D20-roll-06.png";
    },500);

    setTimeout(function(){
        document.getElementById("dice").src = "D20-" + roll + ".png";
        document.getElementById("result").innerHTML = roll;
    },575);

    setTimeout(function(){
        document.getElementById("dice").style.animation =
        "float 4s ease-in-out infinite";
    },575);

};

</script>

</body>
</html>
