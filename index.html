<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Dice of Destiny</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

/* Background */

#background{
    width:100vw;
    height:100vh;
    object-fit:contain;
    display:block;
}


    /* Floating animation */

@keyframes float {
    0%   { transform: translate(-50%, -50%) translateY(0px); }
    50%  { transform: translate(-50%, -50%) translateY(-15px); }
    100% { transform: translate(-50%, -50%) translateY(0px); }
}

@keyframes pulse {

    0%   { scale:1; }

    50%  { scale:1.15; }

    100% { scale:1; }

}
#dice{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    width:220px;
    
    animation: float 4s ease-in-out infinite;
}
    #result{

    position:absolute;

    top:82%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:64px;

    color:white;

    font-weight:bold;

    text-shadow:
        0 0 10px #c084ff,
        0 0 20px #c084ff;

    font-family:Arial, sans-serif;
}
    #rollButton{

    position:absolute;

    top:90%;
    left:50%;

    transform:translate(-50%,-50%);

    padding:10px 20px;

    font-size:20px;

    cursor:pointer;
}
    
  
</style>
</head>

    <body>

<img id="background" src="Blueprint 2.png">

<img id="dice" src="D20 asset.PNG">

<div id="result">17</div>

<button id="rollButton">ROLL FOR YOUR FATE</button>

<script>

document.getElementById("rollButton").onclick = function() {

    document.getElementById("dice").style.animation =
    "pulse 0.4s ease";
let roll = Math.floor(Math.random() * 20) + 1;
    document.getElementById("dice").src = "D20-" + roll + ".png";

setTimeout(function(){

    document.getElementById("result").innerHTML = roll;

},800);

    setTimeout(function(){

        document.getElementById("dice").style.animation =
        "float 4s ease-in-out infinite";

    },800);

};

</script>

</body>
</html>
