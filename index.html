<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dice Chamber</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#111;
    color:white;
    padding:40px;
}

h1{
    margin-bottom:30px;
}

select{
    font-size:20px;
    padding:10px;
}

button{
    font-size:20px;
    padding:12px 24px;
    margin-top:20px;
    cursor:pointer;
}

#result{
    font-size:48px;
    margin-top:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>The Dice Chamber</h1>

<select id="die">
    <option value="4">D4</option>
    <option value="6">D6</option>
    <option value="8">D8</option>
    <option value="10">D10</option>
    <option value="12">D12</option>
    <option value="20" selected>D20</option>
    <option value="100">D100</option>
</select>

<br>

<button onclick="rollDie()">
    TEMPT FATE
</button>

<div id="result">--</div>

<script>
function rollDie() {
    let sides = parseInt(document.getElementById("die").value);
    let result = Math.floor(Math.random() * sides) + 1;

    document.getElementById("result").innerText = result;
}
</script>

</body>
</html>
