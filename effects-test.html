<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Effects Test</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

</style>

</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const embers = [];

for(let i = 0; i < 20; i++){

    embers.push({

        x: canvas.width/2 + (Math.random()-0.5)*120,

        startY: canvas.height/2 + Math.random()*40,

        y: canvas.height/2 + Math.random()*40,

        radius: 3 + Math.random()*5,

        speed: 0.15 + Math.random()*0.35,

        sway: 8 + Math.random()*18,

        offset: Math.random()*1000

    });

}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(const ember of embers){

        ember.y -= ember.speed;

        if(ember.y < ember.startY - 140){

            ember.y = ember.startY;

        }

        const x =
            ember.x +
            Math.sin((ember.y + ember.offset) * 0.03) * ember.sway;

        ctx.beginPath();

        ctx.arc(
            x,
            ember.y,
            ember.radius,
            0,
            Math.PI*2
        );

        ctx.fillStyle="#c084ff";

        ctx.shadowColor="#c084ff";
        ctx.shadowBlur=20;

        ctx.fill();

    }

    requestAnimationFrame(draw);

}

draw();
</script>

</body>
</html>
