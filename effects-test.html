<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Effects Test</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

</style>

</head>
<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.beginPath();

    ctx.arc(
        canvas.width/2,
        canvas.height/2,
        8,
        0,
        Math.PI*2
    );

    ctx.fillStyle="#c084ff";

    ctx.shadowColor="#c084ff";
    ctx.shadowBlur=25;

    ctx.fill();

    requestAnimationFrame(draw);

}

let y = window.innerHeight / 2;

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    y -= 0.35;

    if(y < window.innerHeight/2 - 120){
        y = window.innerHeight/2;
    }

    ctx.beginPath();

    ctx.arc(
        canvas.width/2,
        y,
        8,
        0,
        Math.PI*2
    );

    ctx.fillStyle="#c084ff";

    ctx.shadowColor="#c084ff";
    ctx.shadowBlur=25;

    ctx.fill();

    requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
