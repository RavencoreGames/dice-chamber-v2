<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Effects Test</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const embers = [];

for(let i = 0; i < 20; i++){

    const angle = Math.random() * Math.PI * 2;
    const distance = Math.random() * 55;

    embers.push({

        x: canvas.width/2 + Math.cos(angle) * distance,

        startY: canvas.height/2 + Math.sin(angle) * distance,

        y: canvas.height/2 + Math.sin(angle) * distance,

        radius: 1 + Math.random()*2.5,

        speed: 0.15 + Math.random()*0.35,

        sway: 8 + Math.random()*18,

        offset: Math.random()*1000

    });

}

let breath = 0;

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

 breath += 0.01;

const energy = (Math.sin(breath)+1)/2;

    for(const ember of embers){

        ember.y -= ember.speed * (0.6 + energy*0.8);

        if(ember.y < ember.startY - 140){
            ember.y = ember.startY;
        }

        const x =
            ember.x +
            Math.sin((ember.y + ember.offset) * 0.03) * ember.sway;

        ctx.beginPath();

        ctx.arc(
            x,
            ember.y,
            ember.radius,
            0,
            Math.PI*2
        );

        const glow = 140 + Math.floor(115 * energy);

        ctx.fillStyle = `rgb(${glow},120,255)`;
        ctx.shadowColor = `rgb(${glow},120,255)`;
        ctx.shadowBlur = 10 + energy * 25;

        ctx.fill();

    }

    requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
